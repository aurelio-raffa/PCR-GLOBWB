[globalOptions]
# Please set the pcrglobwb output directory (outputDir) in an absolute path.
# - Please make sure that you have access to it. 
outputDir               =   {outputDir}
# Please set the clone map file (cloneMap), which defines the spatial resolution and extent of your study area.
# - Please make sure that the file is stored locally in your computing machine.
# - The file must be in the pcraster format.
cloneMap                =   {cloneMap}

# Set the input directory map in an absolute path. The input forcing and parameter directories and files will be relative to this.
# - The following is an example using files from the opendap server.
inputDir                =   {inputDir}

# The area/landmask of interest:
# If None, area/landmask is limited for cells with ldd value. 
landmask                =   {landmask}

# netcdf attributes for output files:
institution             =   {institution}
title                   =   {title}
description             =   {description}

# Format: YYYY-MM-DD ; The model runs on daily time step.
startTime = 2000-01-01
endTime   = 2010-12-31

# spinning up options:
maxSpinUpsInYears = 0
minConvForSoilSto = 0.0
minConvForGwatSto = 0.0
minConvForChanSto = 0.0
minConvForTotlSto = 0.0

[meteoOptions]

# Set the forcing temperature and precipitation files (relative to inputDir)
precipitationNC = {dataDir}/meteo/forcing/daily_precipitation_cru_era-interim_1979_to_2010.nc
temperatureNC   = {dataDir}/meteo/forcing/daily_temperature_cru_era-interim_1979_to_2010.nc

# Method to calculate referencePotETP (reference potential evaporation+transpiration)
# options are "Hamon" and "Input" ; If "Input", the netcdf input file must be given:
referenceETPotMethod = Input
refETPotFileNC  = {dataDir}/meteo/forcing/daily_referencePotET_cru_era-interim_1979_to_2010.nc


[landSurfaceOptions]

debugWaterBalance = True

numberOfUpperSoilLayers = 2

# soil and parameters
# - they are used for all land cover types, unless they are are defined in certain land cover type options 
#   (e.g. different/various soil types for agriculture areas)  
topographyNC     = {dataDir}/landSurface/topography/topography_parameters_30_arcmin_october_2015.nc
soilPropertiesNC = {dataDir}/landSurface/soil/soilProperties.nc

includeIrrigation = True

# netcdf time series for historical expansion of irrigation areas (unit: hectares). 
# Note: The resolution of this map must be consisten with the resolution of cellArea. 
historicalIrrigationArea = {dataDir}/waterUse/irrigation/irrigated_areas/irrigationArea30ArcMin.nc

# a pcraster map/value defining irrigation efficiency (dimensionless) - optional
irrigationEfficiency     = {dataDir}/waterUse/irrigation/irrigation_efficiency/efficiency.nc


includeDomesticWaterDemand  = True
includeIndustryWaterDemand  = True
includeLivestockWaterDemand = True

# domestic, industrial and livestock water demand data (unit must be in m.day-1)
domesticWaterDemandFile  = {dataDir}/waterUse/waterDemand/domestic_water_demand_version_october_2014.nc
industryWaterDemandFile  = {dataDir}/waterUse/waterDemand/industrial_water_demand_version_october_2014.nc
livestockWaterDemandFile = {dataDir}/waterUse/waterDemand/livestock_water_demand_1960-2012.nc

# desalination water supply (maximum/potential/capacity)
desalinationWater = {dataDir}/waterUse/desalination/desalination_water_use_version_october_2014.nc

# zone IDs (scale) at which allocations of groundwater and surface water (as well as desalinated water) are performed  
allocationSegmentsForGroundSurfaceWater = {dataDir}/waterUse/abstraction_zones/abstraction_zones_60min_30min.nc

# pcraster maps defining the partitioning of groundwater - surface water source 
#
# - predefined surface water - groundwater partitioning for irrigation demand (e.g. based on Siebert, Global Map of Irrigation Areas version 5)
irrigationSurfaceWaterAbstractionFractionData           = {dataDir}/waterUse/source_partitioning/surface_water_fraction_for_irrigation/AEI_SWFRAC.nc
# -- quality map
irrigationSurfaceWaterAbstractionFractionDataQuality    = {dataDir}/waterUse/source_partitioning/surface_water_fraction_for_irrigation/AEI_QUAL.nc
#
# - threshold values defining the preference for surface water source for irrigation purpose
# -- treshold to maximize surface water irrigation use (cells with irrSurfaceWaterAbstractionFraction above this will prioritize irrigation surface water use)
treshold_to_maximize_irrigation_surface_water           = 0.50
# -- treshold to minimize fossil water withdrawal for irrigation (cells with irrSurfaceWaterAbstractionFraction below this have no fossil withdrawal for irrigation)
treshold_to_minimize_fossil_groundwater_irrigation      = 0.70
#
# - predefined surface water - groundwater partitioning for non irrigation demand (e.g. based on McDonald, 2014)
maximumNonIrrigationSurfaceWaterAbstractionFractionData = {dataDir}/waterUse/source_partitioning/surface_water_fraction_for_non_irrigation/max_city_sw_fraction.nc


[forestOptions]

name = forest
debugWaterBalance = True

# snow module properties
snowModuleType      =  Simple
freezingT           =  0.0
degreeDayFactor     =  0.0025
snowWaterHoldingCap =  0.1
refreezingCoeff     =  0.05

# other paramater values
minTopWaterLayer  = 0.0
minCropKC         = 0.2

cropCoefficientNC = {dataDir}/landSurface/landCover/naturalTall/Global_CropCoefficientKc-Forest_30min.nc
interceptCapNC    = {dataDir}/landSurface/landCover/naturalTall/interceptCapInputForest366days.nc
coverFractionNC   = {dataDir}/landSurface/landCover/naturalTall/coverFractionInputForest366days.nc

landCoverMapsNC   = {dataDir}/landSurface/landCover/naturalTall/forestProperties.nc

# initial conditions:
interceptStorIni = {dataDir}/initialConditions/non-natural/consistent_run_201903XX/1999/interceptStor_forest_1999-12-31.nc
snowCoverSWEIni  = {dataDir}/initialConditions/non-natural/consistent_run_201903XX/1999/snowCoverSWE_forest_1999-12-31.nc
snowFreeWaterIni = {dataDir}/initialConditions/non-natural/consistent_run_201903XX/1999/snowFreeWater_forest_1999-12-31.nc
topWaterLayerIni = {dataDir}/initialConditions/non-natural/consistent_run_201903XX/1999/topWaterLayer_forest_1999-12-31.nc
storUppIni       = {dataDir}/initialConditions/non-natural/consistent_run_201903XX/1999/storUpp_forest_1999-12-31.nc
storLowIni       = {dataDir}/initialConditions/non-natural/consistent_run_201903XX/1999/storLow_forest_1999-12-31.nc
interflowIni     = {dataDir}/initialConditions/non-natural/consistent_run_201903XX/1999/interflow_forest_1999-12-31.nc


